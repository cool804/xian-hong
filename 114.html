<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>SVG Shapes Assignment</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .canvas-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="canvas-container">
        <svg width="400" height="300">
            <rect x="50" y="50" width="150" height="150" 
                  style="fill:blue; stroke:black; stroke-width:5" />
            
            <circle cx="200" cy="125" r="60" 
                    style="fill:yellow; stroke:red; stroke-width:5" />
        </svg>
    </div>

</body>
</html>
