<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Form Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 250px;
            padding: 5px;
            font-size: 1em;
        }
        .buttons {
            margin-top: 20px;
        }
        input[type="submit"], input[type="reset"] {
            padding: 5px 15px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <form>
        <div class="form-group">
            <label>First name:Wu</label>
            <input type="text" name="firstname" value="Your first name">
        </div>

        <div class="form-group">
            <label>Last name:xian hong</label>
            <input type="text" name="lastname" value="Your last name">
        </div>

        <div class="form-group">
            <label>Student ID:113403032</label>
            <input type="text" name="studentid" value="Your student ID">
        </div>

        <div class="buttons">
            <input type="submit" value="Submit">
            <input type="reset" value="重設">
        </div>
    </form>

</body>
</html>
